services:
  postgres:
    image: postgres:17
    container_name: postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: DB-OLIMPIA
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../SQL:/docker-entrypoint-initdb.d

volumes:
  postgres_data: